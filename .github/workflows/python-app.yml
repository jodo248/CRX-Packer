#This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

# Change these two values to build a different extension - nothing else in this
# file needs to be touched.
env:
  EXTENSION_NAME: Tampermonkey
  EXTENSION_VERSION: 5-1-1

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Install Chrome 122
      uses: browser-actions/setup-chrome@v2
      id: setup-chrome
      with:
        chrome-version: 122
    - name: Extract extension source
      run: |
        set -e
        ARCHIVE=$(find . -maxdepth 1 \( -iname "*.zip" -o -iname "*.tar.gz" -o -iname "*.tgz" \) | head -n 1)
        if [ -z "$ARCHIVE" ]; then
          echo "::error::No .zip or .tar.gz source archive found in repo root"
          exit 1
        fi
        echo "Found source archive: $ARCHIVE"

        rm -rf "./$EXTENSION_NAME"
        mkdir -p "./$EXTENSION_NAME"

        case "$ARCHIVE" in
          *.zip)
            unzip -q "$ARCHIVE" -d "./$EXTENSION_NAME"
            ;;
          *.tar.gz|*.tgz)
            tar -xzf "$ARCHIVE" -C "./$EXTENSION_NAME"
            ;;
        esac

        # If the archive wrapped everything in one subfolder (e.g. a GitHub-style
        # "reponame-branch/" zip), flatten it so manifest.json ends up at the top level.
        if [ ! -f "./$EXTENSION_NAME/manifest.json" ]; then
          INNER_DIRS=$(find "./$EXTENSION_NAME" -mindepth 1 -maxdepth 1 -type d)
          INNER_COUNT=$(echo "$INNER_DIRS" | grep -c . || true)
          if [ "$INNER_COUNT" -eq 1 ] && [ -f "$INNER_DIRS/manifest.json" ]; then
            echo "Flattening nested folder: $INNER_DIRS"
            shopt -s dotglob
            mv "$INNER_DIRS"/* "./$EXTENSION_NAME/"
            rmdir "$INNER_DIRS"
          fi
        fi

        echo "Extracted contents:"
        ls -la "./$EXTENSION_NAME"
    - name: Pack extension with Chrome
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb
        xvfb-run --auto-servernum "${{ steps.setup-chrome.outputs.chrome-path }}" --pack-extension="./$EXTENSION_NAME" --pack-extension-key=./key.pem --no-message-box --no-sandbox --no-zygote --disable-dev-shm-usage
        mv "./$EXTENSION_NAME.crx" "./${EXTENSION_NAME}_${EXTENSION_VERSION}.crx"
    - name: Upload CRX artifact
      uses: actions/upload-artifact@v7
      with:
        path: ${{ env.EXTENSION_NAME }}_${{ env.EXTENSION_VERSION }}.crx
        archive: false
        if-no-files-found: error
        retention-days: 1
